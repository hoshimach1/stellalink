name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stellalink
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellalink_test
        options: >-
          --health-cmd "pg_isready -U stellalink"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://stellalink:password@postgres:5432/stellalink_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Install pip
        run: |
          apt-get update -qq
          apt-get install -y -qq python3-pip

      - name: Install dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python3 -m ruff check app/

      - name: Apply schema
        run: |
          python3 -m pip install psycopg2-binary
          python3 - <<'EOF'
          import psycopg2, pathlib
          conn = psycopg2.connect(
              "postgresql://stellalink:password@postgres:5432/stellalink_test"
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(pathlib.Path("../schema.sql").read_text())
          conn.close()
          print("schema applied")
          EOF

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
