name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stellalink
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellalink_test
        options: >-
          --health-cmd "pg_isready -U stellalink"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://stellalink:password@postgres:5432/stellalink_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python + pip
        run: |
          set -e
          if ! command -v python3 >/dev/null 2>&1; then
            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; fi
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq python3 python3-pip
          fi
          if ! python3 -m pip --version >/dev/null 2>&1; then
            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; fi
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq python3-pip
          fi
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python3 -m ruff check app/

      - name: Apply schema
        run: |
          python3 - <<'EOF'
          import psycopg2, pathlib
          conn = psycopg2.connect(
              "postgresql://stellalink:password@postgres:5432/stellalink_test"
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(pathlib.Path("../schema.sql").read_text())
          conn.close()
          print("schema applied")
          EOF

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        run: |
          set -e
          if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; fi
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq nodejs npm
          fi
          node --version
          npm --version
          NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$NODE_MAJOR" -lt 18 ]; then
            echo "::error::Node.js >= 18 is required, found $(node --version)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
