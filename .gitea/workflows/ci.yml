name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stellalink
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellalink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stellalink"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://stellalink:password@localhost:5432/stellalink_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Apply schema
        run: |
          pip install psycopg2-binary
          python - <<'EOF'
          import psycopg2, pathlib
          conn = psycopg2.connect(
              "postgresql://stellalink:password@localhost:5432/stellalink_test"
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(pathlib.Path("../schema.sql").read_text())
          conn.close()
          print("schema applied")
          EOF

      - name: Run tests
        run: pytest tests/ -v --tb=short
