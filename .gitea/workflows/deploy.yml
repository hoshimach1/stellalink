name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure SSH client
        run: |
          set -e
          if ! command -v ssh >/dev/null 2>&1 || ! command -v scp >/dev/null 2>&1; then
            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; fi
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq openssh-client
          fi

      - name: Configure SSH key
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -eu
          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST secret}"
          : "${DEPLOY_SSH_PRIVATE_KEY:?Set DEPLOY_SSH_PRIVATE_KEY secret}"

          DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > "$HOME/.ssh/deploy_key.pub"
          echo "Deploy key fingerprint:"
          ssh-keygen -lf "$HOME/.ssh/deploy_key.pub"

          if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$DEPLOY_SSH_PORT" "$DEPLOY_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host deploy-target
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            IdentityFile $HOME/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $HOME/.ssh/known_hosts
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Verify deploy target
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -eu
          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST secret}"
          : "${DEPLOY_SSH_USER:?Set DEPLOY_SSH_USER secret}"

          DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          LOCAL_HOSTNAME="$(hostname)"
          REMOTE_HOSTNAME="$(
            ssh "$DEPLOY_SSH_USER@deploy-target" 'hostname'
          )"

          echo "Runner hostname: $LOCAL_HOSTNAME"
          echo "Deploy hostname: $REMOTE_HOSTNAME"

          if [ "$LOCAL_HOSTNAME" = "$REMOTE_HOSTNAME" ]; then
            echo "::error::DEPLOY_SSH_HOST points to the same machine as the Gitea runner. Set DEPLOY_SSH_HOST to the promo/deploy server."
            exit 1
          fi

      - name: Update code on deploy server
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_REF: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -eu
          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST secret}"
          : "${DEPLOY_SSH_USER:?Set DEPLOY_SSH_USER secret}"
          : "${DEPLOY_PATH:?Set DEPLOY_PATH secret}"

          DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"

          ssh "$DEPLOY_SSH_USER@deploy-target" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REPO_URL='$DEPLOY_REPO_URL' DEPLOY_REF='$DEPLOY_REF' DEPLOY_SHA='$DEPLOY_SHA' sh -s" <<'REMOTE'
          set -eu

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            : "${DEPLOY_REPO_URL:?Set DEPLOY_REPO_URL secret for the first deploy}"
            if [ -d "$DEPLOY_PATH" ] && [ "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
              echo "Deploy path exists and is not an empty git repository: $DEPLOY_PATH" >&2
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"
            git clone "$DEPLOY_REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          if [ -n "${DEPLOY_REPO_URL:-}" ]; then
            git remote set-url origin "$DEPLOY_REPO_URL"
          fi

          git fetch --prune origin "$DEPLOY_REF"
          git checkout -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"
          REMOTE

      - name: Upload backend .env
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -eu
          : "${BACKEND_ENV:?Set BACKEND_ENV secret}"
          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST secret}"
          : "${DEPLOY_SSH_USER:?Set DEPLOY_SSH_USER secret}"
          : "${DEPLOY_PATH:?Set DEPLOY_PATH secret}"

          DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          ENV_FILE="$(mktemp)"
          trap 'rm -f "$ENV_FILE"' EXIT
          printf '%s\n' "$BACKEND_ENV" > "$ENV_FILE"

          scp "$ENV_FILE" "$DEPLOY_SSH_USER@deploy-target:$DEPLOY_PATH/backend/.env"

      - name: Build and restart on deploy server
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -eu
          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST secret}"
          : "${DEPLOY_SSH_USER:?Set DEPLOY_SSH_USER secret}"
          : "${DEPLOY_PATH:?Set DEPLOY_PATH secret}"

          DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"

          ssh "$DEPLOY_SSH_USER@deploy-target" \
            "DEPLOY_PATH='$DEPLOY_PATH' sh -s" <<'REMOTE'
          set -eu
          cd "$DEPLOY_PATH/backend"

          docker compose up -d db redis
          until docker compose exec -T db pg_isready -U stellalink >/dev/null 2>&1; do sleep 1; done
          docker compose exec -T db psql -U stellalink -d stellalink < ../schema.sql
          DOCKER_BUILDKIT=1 docker compose build --parallel api frontend
          docker compose up -d --no-deps --force-recreate api frontend dozzle
          docker image prune -f
          REMOTE
