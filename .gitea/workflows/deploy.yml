name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build & restart
        run: |
          ssh -o StrictHostKeyChecking=no deploy@localhost "
            cd ${{ secrets.DEPLOY_PATH }}/backend &&
            docker compose build api &&
            docker compose up -d --no-deps api &&
            docker image prune -f
          "
