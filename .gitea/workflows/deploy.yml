name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          if ! command -v docker &>/dev/null; then
            curl -fsSL https://get.docker.com | sh
          fi

      - name: Create .env
        working-directory: backend
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env
          echo "--- .env lines: $(wc -l < .env) ---"

      - name: Build & restart
        working-directory: backend
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose up -d db redis
          until docker exec backend-db-1 pg_isready -U stellalink 2>/dev/null; do sleep 1; done
          docker exec -i backend-db-1 psql -U stellalink -d stellalink < ../schema.sql
          docker compose build --parallel api frontend
          docker compose up -d --no-deps --force-recreate api frontend dozzle
          docker image prune -f
