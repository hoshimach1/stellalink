stages:
  - test
  - build
  - deploy

default:
  interruptible: true

variables:
  GIT_DEPTH: "1"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  NPM_CONFIG_FUND: "false"
  NUXT_TELEMETRY_DISABLED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_ROOT_USER_ACTION: "ignore"
  PYTHONDONTWRITEBYTECODE: "1"

backend_lint:
  stage: test
  image: python:3.12-slim
  cache:
    key:
      files:
        - backend/requirements.txt
        - backend/requirements-dev.txt
    paths:
      - .cache/pip/
  script:
    - |
      if docker info >/dev/null 2>&1; then
        docker run --rm \
          -v "$CI_PROJECT_DIR:/work" \
          -w /work/backend \
          -e PIP_CACHE_DIR=/work/.cache/pip \
          -e PIP_DISABLE_PIP_VERSION_CHECK="$PIP_DISABLE_PIP_VERSION_CHECK" \
          -e PIP_ROOT_USER_ACTION="$PIP_ROOT_USER_ACTION" \
          -e PYTHONDONTWRITEBYTECODE="$PYTHONDONTWRITEBYTECODE" \
          python:3.12-slim sh -lc '
            python --version
            python -m pip install -r requirements-dev.txt
            python -m pip check
            python -m ruff check app tests
            python -m ruff format --check app tests
            python -m compileall -q app tests
          '
      else
        cd backend
        python --version
        python -m pip install -r requirements-dev.txt
        python -m pip check
        python -m ruff check app tests
        python -m ruff format --check app tests
        python -m compileall -q app tests
      fi

backend_api_tests:
  stage: test
  image: python:3.12-slim
  cache:
    key:
      files:
        - backend/requirements.txt
        - backend/requirements-dev.txt
    paths:
      - .cache/pip/
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_USER: stellalink
    POSTGRES_PASSWORD: password
    POSTGRES_DB: stellalink_test
    DATABASE_URL: postgresql+asyncpg://stellalink:password@postgres:5432/stellalink_test
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: ci-test-secret-key-not-for-production
  script:
    - |
      if docker info >/dev/null 2>&1; then
        TEST_NETWORK="stellalink-ci-$CI_JOB_ID"
        POSTGRES_CONTAINER="stellalink-postgres-$CI_JOB_ID"
        REDIS_CONTAINER="stellalink-redis-$CI_JOB_ID"

        cleanup() {
          docker rm -f "$POSTGRES_CONTAINER" "$REDIS_CONTAINER" >/dev/null 2>&1 || true
          docker network rm "$TEST_NETWORK" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        docker network create "$TEST_NETWORK"
        docker run -d --name "$POSTGRES_CONTAINER" --network "$TEST_NETWORK" --network-alias postgres \
          -e POSTGRES_USER=stellalink \
          -e POSTGRES_PASSWORD=password \
          -e POSTGRES_DB=stellalink_test \
          postgres:16-alpine
        docker run -d --name "$REDIS_CONTAINER" --network "$TEST_NETWORK" --network-alias redis \
          redis:7-alpine

        mkdir -p test-results
        docker run --rm \
          --network "$TEST_NETWORK" \
          -v "$CI_PROJECT_DIR:/work" \
          -w /work/backend \
          -e PIP_CACHE_DIR=/work/.cache/pip \
          -e PIP_DISABLE_PIP_VERSION_CHECK="$PIP_DISABLE_PIP_VERSION_CHECK" \
          -e PIP_ROOT_USER_ACTION="$PIP_ROOT_USER_ACTION" \
          -e PYTHONDONTWRITEBYTECODE="$PYTHONDONTWRITEBYTECODE" \
          -e DATABASE_URL="$DATABASE_URL" \
          -e REDIS_URL="$REDIS_URL" \
          -e SECRET_KEY="$SECRET_KEY" \
          python:3.12-slim sh -lc '
            python --version
            python -m pip install -r requirements-dev.txt
            python - <<'"'"'PY'"'"'
      import pathlib
      import time

      import psycopg2

      conn = None
      for attempt in range(30):
          try:
              conn = psycopg2.connect(
                  "postgresql://stellalink:password@postgres:5432/stellalink_test"
              )
              break
          except psycopg2.OperationalError:
              if attempt == 29:
                  raise
              time.sleep(1)

      conn.autocommit = True
      cur = conn.cursor()
      cur.execute(pathlib.Path("../schema.sql").read_text())
      conn.close()
      print("schema applied")
      PY
            python -m pytest tests/ -v --tb=short --strict-config --strict-markers --junitxml=/work/test-results/backend-api.xml
          '
      else
        cd backend
        python --version
        python -m pip install -r requirements-dev.txt
        python - <<'PY'
      import pathlib
      import time

      import psycopg2

      conn = None
      for attempt in range(30):
          try:
              conn = psycopg2.connect(
                  "postgresql://stellalink:password@postgres:5432/stellalink_test"
              )
              break
          except psycopg2.OperationalError:
              if attempt == 29:
                  raise
              time.sleep(1)

      conn.autocommit = True
      cur = conn.cursor()
      cur.execute(pathlib.Path("../schema.sql").read_text())
      conn.close()
      print("schema applied")
      PY
        mkdir -p ../test-results
        python -m pytest tests/ -v --tb=short --strict-config --strict-markers --junitxml=../test-results/backend-api.xml
      fi
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit:
        - test-results/backend-api.xml
    paths:
      - test-results/backend-api.xml

frontend_build:
  stage: build
  image: node:20-alpine
  needs: []
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .cache/npm/
      - frontend/.nuxt/cache/
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - |
      if docker info >/dev/null 2>&1; then
        docker run --rm \
          -v "$CI_PROJECT_DIR:/work" \
          -w /work/frontend \
          -e NPM_CONFIG_AUDIT="$NPM_CONFIG_AUDIT" \
          -e NPM_CONFIG_CACHE=/work/.cache/npm \
          -e NPM_CONFIG_FUND="$NPM_CONFIG_FUND" \
          -e NUXT_TELEMETRY_DISABLED="$NUXT_TELEMETRY_DISABLED" \
          node:20-alpine sh -lc '
            node --version
            npm --version
            npm ci --prefer-offline
            npm run build
          '
      else
        cd frontend
        node --version
        npm --version
        npm ci --prefer-offline
        npm run build
      fi
  artifacts:
    expire_in: 1 day
    paths:
      - frontend/.output/

deploy_production:
  stage: deploy
  image: alpine:3.20
  tags:
    - stellalink
  needs:
    - job: backend_lint
      artifacts: false
    - job: backend_api_tests
      artifacts: false
    - job: frontend_build
      optional: true
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
  before_script:
    - test -n "$BACKEND_ENV"
    - |
      if [ -n "${DEPLOY_SSH_HOST:-}" ] && [ -n "${DEPLOY_SSH_USER:-}" ] && [ -n "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
        export DEPLOY_MODE="remote"
        test -n "$DEPLOY_PATH"
      elif [ -z "${DEPLOY_SSH_HOST:-}" ] && [ -z "${DEPLOY_SSH_USER:-}" ] && [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
        export DEPLOY_MODE="local"
        export DEPLOY_PATH="${DEPLOY_PATH:-$CI_PROJECT_DIR}"
      else
        echo "Set all SSH deploy variables or none of them: DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_PRIVATE_KEY." >&2
        exit 1
      fi
      echo "Deploy mode: $DEPLOY_MODE"
      echo "Deploy path: $DEPLOY_PATH"
    - export DEPLOY_SSH_PORT="${DEPLOY_SSH_PORT:-22}"
    - |
      if [ "$DEPLOY_MODE" != "remote" ]; then
        echo "SSH deploy variables are not set; using local deploy on this runner."
        if ! mkdir -p "$DEPLOY_PATH" 2>/dev/null || [ ! -w "$DEPLOY_PATH" ]; then
          echo "Local DEPLOY_PATH is not writable by $(whoami) (uid=$(id -u), gid=$(id -g)): $DEPLOY_PATH" >&2
          echo "Falling back to CI project directory: $CI_PROJECT_DIR" >&2
          export DEPLOY_PATH="$CI_PROJECT_DIR"
        fi
      fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        missing=""
        for cmd in ssh rsync nc; do
          if ! command -v "$cmd" >/dev/null 2>&1; then
            missing="$missing $cmd"
          fi
        done
        if [ -n "$missing" ]; then
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache openssh-client rsync netcat-openbsd
          elif command -v apt-get >/dev/null 2>&1 && { [ "$(id -u)" -eq 0 ] || command -v sudo >/dev/null 2>&1; }; then
            sudo_cmd=""
            if [ "$(id -u)" -ne 0 ]; then
              sudo_cmd="sudo"
            fi
            $sudo_cmd apt-get update -qq
            $sudo_cmd apt-get install -y -qq openssh-client rsync netcat-openbsd
          else
            echo "Missing required remote deploy commands:$missing" >&2
            echo "Install openssh-client, rsync, and netcat-openbsd on the shell runner host, or use local deploy without SSH variables." >&2
            exit 1
          fi
        fi
      fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then mkdir -p "$HOME/.ssh"; fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then chmod 700 "$HOME/.ssh"; fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        if [ -f "$DEPLOY_SSH_PRIVATE_KEY" ]; then
          cp "$DEPLOY_SSH_PRIVATE_KEY" "$HOME/.ssh/deploy_key"
        else
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
        fi
      fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then sed -i 's/\r$//' "$HOME/.ssh/deploy_key"; fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then printf '\n' >> "$HOME/.ssh/deploy_key"; fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        if ! head -n 1 "$HOME/.ssh/deploy_key" | grep -Eq '^-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----$'; then
          echo "DEPLOY_SSH_PRIVATE_KEY must contain a private OpenSSH key, not a .pub key, not a .ppk file, and not escaped \\n text." >&2
          echo "Expected first line: -----BEGIN OPENSSH PRIVATE KEY-----" >&2
          exit 1
        fi
      fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then chmod 600 "$HOME/.ssh/deploy_key"; fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        if ! ssh-keygen -y -P "" -f "$HOME/.ssh/deploy_key" >/dev/null; then
          echo "DEPLOY_SSH_PRIVATE_KEY is not readable by OpenSSH or has a passphrase." >&2
          echo "Generate an unencrypted key with: ssh-keygen -t ed25519 -f deploy_gitlab_key -N \"\"" >&2
          exit 1
        fi
      fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
          if [ -f "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            cp "$DEPLOY_SSH_KNOWN_HOSTS" "$HOME/.ssh/known_hosts"
          else
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          fi
          sed -i 's/\r$//' "$HOME/.ssh/known_hosts"
        else
          scan_log="$HOME/.ssh/keyscan.log"
          : > "$HOME/.ssh/known_hosts"
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -p "$DEPLOY_SSH_PORT" "$DEPLOY_SSH_HOST" > "$HOME/.ssh/known_hosts" 2>"$scan_log"; then
              break
            fi
            echo "ssh-keyscan attempt $attempt failed for $DEPLOY_SSH_HOST:$DEPLOY_SSH_PORT" >&2
            cat "$scan_log" >&2 || true
            sleep 2
          done
        fi
        if [ ! -s "$HOME/.ssh/known_hosts" ]; then
          echo "Could not populate known_hosts for $DEPLOY_SSH_HOST:$DEPLOY_SSH_PORT." >&2
          echo "Set DEPLOY_SSH_KNOWN_HOSTS to the output of: ssh-keyscan -p $DEPLOY_SSH_PORT $DEPLOY_SSH_HOST" >&2
          exit 1
        fi
      fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then chmod 644 "$HOME/.ssh/known_hosts"; fi
    - |
      if [ "$DEPLOY_MODE" = "remote" ]; then
        cat > "$HOME/.ssh/config" <<EOF
      Host deploy-target
        HostName $DEPLOY_SSH_HOST
        Port $DEPLOY_SSH_PORT
        User $DEPLOY_SSH_USER
        IdentityFile $HOME/.ssh/deploy_key
        IdentitiesOnly yes
        BatchMode yes
        ConnectTimeout 15
        StrictHostKeyChecking yes
        UserKnownHostsFile $HOME/.ssh/known_hosts
        ControlMaster auto
        ControlPath $HOME/.ssh/control-%C
        ControlPersist 10m
      EOF
      fi
    - if [ "$DEPLOY_MODE" = "remote" ]; then chmod 600 "$HOME/.ssh/config"; fi
  script:
    - |
      START="$(date +%s)"
      if [ "$DEPLOY_MODE" = "local" ]; then
        echo "Local deploy target: $(hostname)"
        mkdir -p "$DEPLOY_PATH"
        echo "deploy_timing local_prepare=$(( $(date +%s) - START ))s"
      else
        echo "Checking deploy DNS for $DEPLOY_SSH_HOST"
        getent hosts "$DEPLOY_SSH_HOST" || nslookup "$DEPLOY_SSH_HOST" || true
        echo "Checking deploy TCP reachability for $DEPLOY_SSH_HOST:$DEPLOY_SSH_PORT"
        if ! nc -vz -w 15 "$DEPLOY_SSH_HOST" "$DEPLOY_SSH_PORT"; then
          echo "CI runner cannot connect to $DEPLOY_SSH_HOST:$DEPLOY_SSH_PORT." >&2
          echo "SSH may work from your server or laptop, but the GitLab runner network still needs outbound access and the deploy server firewall must allow this source." >&2
          exit 1
        fi
        ssh deploy-target "hostname && mkdir -p '$DEPLOY_PATH'"
        echo "deploy_timing ssh_prepare=$(( $(date +%s) - START ))s"
      fi
    - |
      START="$(date +%s)"
      if [ "$DEPLOY_MODE" = "local" ] && [ "$DEPLOY_PATH" = "$CI_PROJECT_DIR" ]; then
        echo "Local deploy uses CI project directory; source sync skipped."
      elif [ "$DEPLOY_MODE" = "local" ]; then
        mkdir -p "$DEPLOY_PATH"
        tar \
          --exclude='./.git' \
          --exclude='./.gitea' \
          --exclude='./.idea' \
          --exclude='./.playwright-mcp' \
          --exclude='./.tmp' \
          --exclude='./.cache' \
          --exclude='./artifacts' \
          --exclude='./backups' \
          --exclude='./test-results' \
          --exclude='./frontend/node_modules' \
          --exclude='./frontend/.nuxt' \
          --exclude='./frontend/.output' \
          --exclude='./frontend/backups' \
          --exclude='./frontend/coverage' \
          --exclude='./backend/.env' \
          --exclude='./backend/tests' \
          --exclude='./backend/uploads' \
          --exclude='./backend/__pycache__' \
          --exclude='./backend/.pytest_cache' \
          --exclude='./backend/.ruff_cache' \
          -cf - . | tar -xf - -C "$DEPLOY_PATH"
      else
        rsync -az --delete \
          --exclude '.git/' \
          --exclude '.gitea/' \
          --exclude '.idea/' \
          --exclude '.playwright-mcp/' \
          --exclude '.tmp/' \
          --exclude '.cache/' \
          --exclude 'artifacts/' \
          --exclude 'backups/' \
          --exclude 'test-results/' \
          --exclude 'frontend/node_modules/' \
          --exclude 'frontend/.nuxt/' \
          --exclude 'frontend/.output/' \
          --exclude 'frontend/backups/' \
          --exclude 'frontend/coverage/' \
          --exclude 'backend/.env' \
          --exclude 'backend/tests/' \
          --exclude 'backend/uploads/' \
          --exclude 'backend/__pycache__/' \
          --exclude 'backend/.pytest_cache/' \
          --exclude 'backend/.ruff_cache/' \
          ./ deploy-target:"$DEPLOY_PATH"/
      fi
      echo "deploy_timing source_sync=$(( $(date +%s) - START ))s mode=$DEPLOY_MODE"
    - |
      START="$(date +%s)"
      BACKEND_ENV_FILE=""
      if [ -f "$BACKEND_ENV" ]; then
        BACKEND_ENV_FILE="$BACKEND_ENV"
      else
        BACKEND_ENV_FILE="$(mktemp)"
        printf '%s\n' "$BACKEND_ENV" > "$BACKEND_ENV_FILE"
      fi

      INVALID_ENV_LINE="$(
        awk '
          /^[[:space:]]*$/ { next }
          /^[[:space:]]*#/ { next }
          /^[A-Za-z_][A-Za-z0-9_]*=/ { next }
          { print NR; exit }
        ' "$BACKEND_ENV_FILE"
      )"
      if [ -n "$INVALID_ENV_LINE" ]; then
        echo "BACKEND_ENV must contain .env contents in KEY=value format, not a path like ./backend/.env." >&2
        echo "Invalid BACKEND_ENV line: $INVALID_ENV_LINE" >&2
        exit 1
      fi

      if [ "$DEPLOY_MODE" = "remote" ]; then
        scp "$BACKEND_ENV_FILE" deploy-target:"$DEPLOY_PATH/backend/.env"
      else
        mkdir -p "$DEPLOY_PATH/backend"
        cp "$BACKEND_ENV_FILE" "$DEPLOY_PATH/backend/.env"
      fi
      echo "deploy_timing backend_env=$(( $(date +%s) - START ))s"
    - |
      START="$(date +%s)"
      if [ ! -f frontend/.output/server/index.mjs ]; then
        echo "Frontend artifact is absent; building frontend in deploy job."
        if docker info >/dev/null 2>&1; then
          docker run --rm \
            -v "$CI_PROJECT_DIR:/work" \
            -w /work/frontend \
            -e NPM_CONFIG_AUDIT="$NPM_CONFIG_AUDIT" \
            -e NPM_CONFIG_CACHE=/work/.cache/npm \
            -e NPM_CONFIG_FUND="$NPM_CONFIG_FUND" \
            -e NUXT_TELEMETRY_DISABLED="$NUXT_TELEMETRY_DISABLED" \
            node:20-alpine sh -lc '
              npm ci --prefer-offline
              npm run build
            '
        elif command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1; then
          (
            cd frontend
            npm ci --prefer-offline
            npm run build
          )
        else
          echo "Cannot build frontend: Docker is unavailable and node/npm are not installed." >&2
          exit 1
        fi
      fi

      FRONTEND_ARTIFACT_READY=0
      if [ -f frontend/.output/server/index.mjs ]; then
        if [ "$DEPLOY_MODE" = "local" ] && [ "$DEPLOY_PATH" = "$CI_PROJECT_DIR" ]; then
          echo "Local deploy uses CI project directory; frontend artifact sync skipped."
        elif [ "$DEPLOY_MODE" = "remote" ]; then
          rsync -az --delete frontend/.output/ deploy-target:"$DEPLOY_PATH/frontend/.output"/
        else
          mkdir -p "$DEPLOY_PATH/frontend/.output"
          tar -cf - -C frontend/.output . | tar -xf - -C "$DEPLOY_PATH/frontend/.output"
        fi
        FRONTEND_ARTIFACT_READY=1
      fi
      echo "deploy_timing frontend_artifact=$(( $(date +%s) - START ))s ready=$FRONTEND_ARTIFACT_READY"
    - |
      START="$(date +%s)"
      FRONTEND_ARTIFACT_READY=0
      if [ -f frontend/.output/server/index.mjs ]; then
        FRONTEND_ARTIFACT_READY=1
      fi
      if [ "$DEPLOY_MODE" = "local" ]; then
        if ! docker info >/dev/null 2>&1; then
          echo "Local deploy requires Docker access on the GitLab runner." >&2
          echo "Use a shell/self-hosted runner on the deploy host, or mount the Docker socket for this job." >&2
          exit 1
        fi
        cd "$DEPLOY_PATH/backend"
        export COMPOSE_DOCKER_CLI_BUILD=1
        export DOCKER_BUILDKIT=1
        step_start="$(date +%s)"

        docker compose up -d db redis
        until docker compose exec -T db pg_isready -U stellalink >/dev/null 2>&1; do sleep 1; done
        echo "deploy_timing local_db_redis=$(( $(date +%s) - step_start ))s"

        step_start="$(date +%s)"
        docker compose build api
        echo "deploy_timing local_api_build=$(( $(date +%s) - step_start ))s"

        step_start="$(date +%s)"
        docker compose up -d --no-deps api dozzle
        if [ "$FRONTEND_ARTIFACT_READY" = "1" ]; then
          docker compose up -d --no-deps --force-recreate frontend
        else
          docker compose up -d --no-deps frontend
        fi
        echo "deploy_timing local_compose_up=$(( $(date +%s) - step_start ))s"

        if [ "${DEPLOY_PRUNE_IMAGES:-0}" = "1" ]; then
          step_start="$(date +%s)"
          docker image prune -f
          echo "deploy_timing local_image_prune=$(( $(date +%s) - step_start ))s"
        fi
        echo "deploy_timing local_total=$(( $(date +%s) - START ))s"
      else
        ssh deploy-target "DEPLOY_PATH='$DEPLOY_PATH' FRONTEND_ARTIFACT_READY='$FRONTEND_ARTIFACT_READY' sh -s" <<'REMOTE'
        set -eu
        cd "$DEPLOY_PATH/backend"
        export COMPOSE_DOCKER_CLI_BUILD=1
        export DOCKER_BUILDKIT=1
        step_start="$(date +%s)"

        docker compose up -d db redis
        until docker compose exec -T db pg_isready -U stellalink >/dev/null 2>&1; do sleep 1; done
        echo "deploy_timing remote_db_redis=$(( $(date +%s) - step_start ))s"

        step_start="$(date +%s)"
        docker compose build api
        echo "deploy_timing remote_api_build=$(( $(date +%s) - step_start ))s"

        step_start="$(date +%s)"
        docker compose up -d --no-deps api dozzle
        if [ "$FRONTEND_ARTIFACT_READY" = "1" ]; then
          docker compose up -d --no-deps --force-recreate frontend
        else
          docker compose up -d --no-deps frontend
        fi
        echo "deploy_timing remote_compose_up=$(( $(date +%s) - step_start ))s"

        if [ "${DEPLOY_PRUNE_IMAGES:-0}" = "1" ]; then
          step_start="$(date +%s)"
          docker image prune -f
          echo "deploy_timing remote_image_prune=$(( $(date +%s) - step_start ))s"
        fi
      REMOTE
        echo "deploy_timing remote_total=$(( $(date +%s) - START ))s"
      fi
